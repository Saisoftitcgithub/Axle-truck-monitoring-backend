
services:
  postgres:
    image: postgres:15-alpine
    container_name: truck_monitoring_postgres
    environment:
      POSTGRES_USER: truck_user
      POSTGRES_PASSWORD: truck_password_123
      POSTGRES_DB: truck_movements
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truck_user -d truck_movements"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
